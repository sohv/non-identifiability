paper:
  format: "single"
  
  # Single-column plots
  single_column:
    width: 3.3
    height: 2.8
  
  heatmap:
    width: 3.5
    height: 2.0
  
  full_page:
    width: 7.2
    height: 2.8
  
  dpi: 300

fonts:
  family: "sans-serif"
  sans_serif_fonts: ["Helvetica", "Arial", "DejaVu Sans"]
  
  label_weight: "normal"
  title_weight: "bold"
  
  title: 11
  axis_label: 8
  axis_title: 8
  tick_label: 7
  legend: 8
  annotation: 7
  
  rcParams:
    font.size: 9
    axes.titlesize: 11
    axes.labelsize: 8
    xtick.labelsize: 7
    ytick.labelsize: 7
    legend.fontsize: 8
    lines.linewidth: 1.2

colors:
  models:
    qwen_3b: "#1f77b4"
    llama_8b: "#d62728"
    qwen_7b: "#2ca02c"
  
  traits:
    formality: "#1f77b4"
    sentiment: "#d62728"
    humor: "#ff7f0e"
    politeness: "#2ca02c"
  
  primary: "#1f77b4"
  secondary: "#d62728"
  neutral: "#7f7f7f"
  background: "#ffffff"
  
  fill_alpha: 0.15
  grid_alpha: 0.3
  legend_alpha: 0.95

lines:
  linewidth: 1.2
  
  primary_line_width: 1.2
  primary_marker: "o"
  primary_marker_size: 6
  primary_linestyle: "-"
  
  secondary_line_width: 1.2
  secondary_marker: "s"
  secondary_marker_size: 6
  secondary_linestyle: "--"
  
  trend_linewidth: 1.0
  trend_linestyle: "-"

grid:
  enabled: true
  alpha: 0.3
  linestyle: "--"
  linewidth: 0.5
  which: "both"
  axis: "y"

layout:
  tight: true
  bbox_inches: "tight"
  pad_inches: 0.05
  
  hspace: 0.35
  wspace: 0.25

legend:
  enabled: true
  position: "upper left"
  framealpha: 0.95
  frameon: true
  shadow: false
  fontsize: 9
  handlelength: 2.0
  handletextpad: 0.6
  labelspacing: 0.5
  ncol: 1

axes:
  spines:
    left: true
    bottom: true
    right: false
    top: false
  
  tick_direction: "in"
  tick_length: 4.0
  tick_width: 0.8
  
  y_min: 0
  x_padding: 0.02

plot_types:
  dual_axis:
    left_color: "#1f77b4"
    right_color: "#d62728"
    line_width: 1.2
    marker_size: 6
    fill_alpha: 0.15
  
  heatmap:
    cmap: "YlOrRd"
    aspect: "auto"
    annotation_fontsize: 7
    cbar_label_size: 8
  
  box:
    width: 0.6
    patch_alpha: 0.7
    line_width: 1.2
  
  line_plots:
    line_width: 1.2
    marker_size: 6
    marker_style: "o"
    fill_alpha: 0.15
    spines:
      left: true
      bottom: true
      right: false
      top: false
    spine_width: 0.5
    grid:
      enabled: true
      axis: "y"
      linestyle: ":"
      alpha: 0.2
      linewidth: 0.5
    no_title: true
  
  bar_plots:
    spines:
      left: true
      bottom: true
      right: false
      top: false
    spine_width: 0.5
    grid:
      enabled: true
      axis: "y"
      linestyle: ":"
      alpha: 0.2
      linewidth: 0.5
    error_bar:
      capsize: 5
      linewidth: 1.0
    no_title: true
    legend:
      fontsize: 8
      framealpha: 0.95
      loc: "upper left"
  
  heatmaps:
    cmap: "RdYlGn_r"
    aspect: "auto"
    annotation_fontsize: 8
    vmin: 0.1
    vmax: 0.7
    spines:
      left: false
      bottom: false
      right: false
      top: false
    no_title: true
  
  scatter_plots:
    spines:
      left: true
      bottom: true
      right: false
      top: false
    spine_width: 0.5
    grid:
      enabled: true
      linestyle: ":"
      alpha: 0.2
      linewidth: 0.5
    marker_size: 100
    marker_alpha: 0.7
    no_title: true
    legend:
      fontsize: 8
      framealpha: 0.95
      loc: "upper left"
      alpha: 0.3
    no_value_labels: true

annotations:
  enabled: true
  fontsize: 9
  color: "black"
  weight: "normal"
  ha: "center"
  va: "center"
  
  precision: 2

output:
  formats: ["pdf", "png"]
  pdf:
    dpi: 300
    bbox_inches: "tight"
    pad_inches: 0.05
  png:
    dpi: 300
    bbox_inches: "tight"
    pad_inches: 0.05
  
  naming:
    sep: "_"
    include_timestamp: false

paths:
  figures_dir: "figures"
  results_dir: "results"
  analysis_dir: "results/analysis"
  config_dir: "config"

matplotlib_rcparams:
  "font.family": "sans-serif"
  "font.sans-serif": ["Helvetica", "Arial", "DejaVu Sans"]
  "font.size": 9
  
  "axes.titlesize": 11
  "axes.labelsize": 10
  "axes.linewidth": 0.8
  "axes.grid": true
  "axes.axisbelow": true
  
  "xtick.labelsize": 9
  "xtick.direction": "in"
  "xtick.major.size": 4.0
  "xtick.major.width": 0.8
  
  "ytick.labelsize": 9
  "ytick.direction": "in"
  "ytick.major.size": 4.0
  "ytick.major.width": 0.8
  
  "legend.fontsize": 9
  "legend.framealpha": 0.95
  "legend.edgecolor": "black"
  
  "lines.linewidth": 1.2
  "lines.markersize": 6
  
  "grid.color": "#cccccc"
  "grid.linestyle": "--"
  "grid.linewidth": 0.5
  "grid.alpha": 0.3
  
  "figure.facecolor": "white"
  "figure.edgecolor": "none"
  "savefig.dpi": 300
  "savefig.bbox": "tight"
  "savefig.pad_inches": 0.05
